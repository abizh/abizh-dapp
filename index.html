<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abizhard DEX - Wayahe Ngopi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --gold: #f3ba2f; --dark: #121212; --card: #1e1e1e; --text: #e0e0e0; --bg-input: #161616; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Header & Brand */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .logo-area h1 { font-size: 1.1em; color: var(--gold); margin: 0; letter-spacing: 1px; }
        .logo-area span { font-size: 0.65em; color: #888; font-weight: bold; }
        
        .btn-wallet { background: #2b2b2b; color: var(--gold); border: 1px solid var(--gold); padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.8em; transition: 0.3s; }

        .container { padding: 20px; max-width: 480px; margin: 0 auto; padding-bottom: 100px; }
        .card { background: var(--card); border-radius: 24px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); margin-bottom: 20px; border: 1px solid #2a2a2a; }
        h3 { margin-top: 0; font-size: 1em; color: #fff; margin-bottom: 20px; border-left: 4px solid var(--gold); padding-left: 10px; }

        /* Swap Component */
        .swap-box { background: var(--bg-input); padding: 16px; border-radius: 18px; margin-bottom: 6px; border: 1px solid #252525; }
        .swap-box label { font-size: 0.75em; color: #888; display: block; margin-bottom: 10px; font-weight: 600; }
        .swap-input-row { display: flex; justify-content: space-between; align-items: center; }
        .swap-input-row input { background: transparent; border: none; color: white; font-size: 1.4em; width: 65%; outline: none; font-weight: 500; }
        .token-tag { background: #2b2b2b; padding: 6px 12px; border-radius: 14px; display: flex; align-items: center; font-weight: bold; font-size: 0.85em; border: 1px solid #444; }

        .divider { text-align: center; margin: -18px 0; position: relative; z-index: 2; }
        .divider-icon { background: #1e1e1e; border: 4px solid var(--dark); border-radius: 50%; padding: 6px; display: inline-block; font-size: 1.2em; color: var(--gold); }

        /* Buttons */
        button.main-btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-weight: bold; font-size: 1em; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-swap { background: var(--gold); color: #000; }
        .btn-send { background: #3d6eff; color: white; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* Nav Bottom */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; border-top: 1px solid #333; padding: 12px 0; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #666; font-size: 0.75em; cursor: pointer; font-weight: 500; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 1.5em; margin-bottom: 4px; }

        /* Pages */
        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stats-row { display: flex; justify-content: space-between; margin: 14px 0; font-size: 0.85em; }
        .stats-row span:first-child { color: #999; }
        .val { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-area">
            <h1>Wayahe Ngopi</h1>
            <span>VERIFIED BY: WONG KEDER</span>
        </div>
        <button id="connectBtn" class="btn-wallet" onclick="toggleConnect()">Connect Wallet</button>
    </div>

    <div class="container">
        <div id="page-wallet" class="page active">
            <div class="card">
                <h3>Asset Overview</h3>
                <div class="stats-row"><span>Token Balance</span> <span class="val" id="bal-token">0 Abizh</span></div>
                <div class="stats-row"><span>Koin Balance</span> <span class="val" id="bal-native">0 BNB</span></div>
                <div class="stats-row"><span>Liquidity Pool</span> <span class="val" id="pool-liq">---</span></div>
            </div>
            <div class="card" style="background: linear-gradient(145deg, #1e1e1e, #252525);">
                <p style="font-size: 0.8em; color: #888; margin: 0;">Gunakan fitur <b>Swap</b> untuk menambah aset atau <b>Send</b> untuk berbagi ke sesama komunitas.</p>
            </div>
        </div>

        <div id="page-swap" class="page">
            <div class="card">
                <h3>Swap Instant</h3>
                <div class="swap-box">
                    <label>YOU PAY</label>
                    <div class="swap-input-row">
                        <input type="number" id="input-pay" placeholder="0.0" oninput="calculateReceive()">
                        <div class="token-tag">🟡 BNB</div>
                    </div>
                </div>
                <div class="divider"><span class="divider-icon">⇅</span></div>
                <div class="swap-box">
                    <label>YOU RECEIVE (EST.)</label>
                    <div class="swap-input-row">
                        <input type="text" id="input-receive" placeholder="0.0" readonly>
                        <div class="token-tag">💎 ABIZH</div>
                    </div>
                </div>
                <div class="stats-row" style="margin-top: 20px; font-size: 0.75em;">
                    <span>Current Rate</span> <span id="rate-display">1 BNB : --- ABIZH</span>
                </div>
                <button id="btnExecuteSwap" class="main-btn btn-swap" onclick="executeTrade()" disabled>Connect Wallet First</button>
            </div>
        </div>

        <div id="page-send" class="page">
            <div class="card">
                <h3>Send Asset</h3>
                <div class="swap-box">
                    <label>RECIPIENT ADDRESS</label>
                    <input type="text" id="send-addr" placeholder="0x..." style="width:100%; color:white; background:transparent; border:none; outline:none; font-size: 1.1em;">
                </div>
                <div class="swap-box" style="margin-top: 15px;">
                    <label>AMOUNT ABIZH</label>
                    <input type="number" id="send-qty" placeholder="0.0" style="width:100%; color:white; background:transparent; border:none; outline:none; font-size: 1.1em;">
                </div>
                <button id="btnExecuteSend" class="main-btn btn-send" onclick="executeSend()" disabled>Connect Wallet First</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="navTo('wallet', this)"><i>🏠</i>Wallet</div>
        <div class="nav-item" onclick="navTo('swap', this)"><i>🔄</i>Swap</div>
        <div class="nav-item" onclick="navTo('send', this)"><i>✈️</i>Send</div>
    </nav>

<script>
    const CONTRACT_ADDR = "0x54fc26c5e0E70b2a5FC307E715cfA95D2c815fE7";
    const ABI = [
        "function getRate() public view returns (uint256)",
        "function balanceOf(address) public view returns (uint256)",
        "function transfer(address to, uint256 amount) public returns (bool)",
        "function totalSupply() public view returns (uint256)"
    ];

    let provider, signer, contract, userAddr, currentRate = 0;

    function navTo(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
        el.classList.add('active');
    }

    async function toggleConnect() {
        if (userAddr) {
            userAddr = null; signer = null; contract = null;
            document.getElementById('connectBtn').innerText = "Connect Wallet";
            alert("Wallet Disconnected");
            location.reload();
            return;
        }

        if (!window.ethereum) return alert("Buka di MetaMask Browser");
        
        try {
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            userAddr = await signer.getAddress();
            contract = new ethers.Contract(CONTRACT_ADDR, ABI, signer);

            document.getElementById('connectBtn').innerText = userAddr.substring(0,6) + "..." + userAddr.substring(38);
            document.getElementById('btnExecuteSwap').innerText = "Swap Now";
            document.getElementById('btnExecuteSwap').disabled = false;
            document.getElementById('btnExecuteSend').innerText = "Send Token";
            document.getElementById('btnExecuteSend').disabled = false;
            
            await updateData();
        } catch (e) { alert("Koneksi gagal"); }
    }

    async function updateData() {
        if (!contract || !userAddr) return;
        try {
            const rate = await contract.getRate();
            currentRate = rate.toNumber();
            const balToken = await contract.balanceOf(userAddr);
            const balNative = await provider.getBalance(userAddr);
            const poolBal = await contract.balanceOf(CONTRACT_ADDR);

            document.getElementById('bal-token').innerText = `${parseFloat(ethers.utils.formatEther(balToken)).toFixed(2)} Abizh`;
            document.getElementById('bal-native').innerText = `${parseFloat(ethers.utils.formatEther(balNative)).toFixed(4)} BNB`;
            document.getElementById('pool-liq').innerText = `${((parseFloat(ethers.utils.formatEther(poolBal)) / 75000000) * 100).toFixed(2)}%`;
            document.getElementById('rate-display').innerText = `1 BNB : ${currentRate.toLocaleString()} ABIZH`;
            
            calculateReceive();
        } catch (e) { console.error(e); }
    }

    function calculateReceive() {
        const payInput = document.getElementById('input-pay');
        const receiveInput = document.getElementById('input-receive');
        const payVal = parseFloat(payInput.value);

        if (!isNaN(payVal) && payVal > 0 && currentRate > 0) {
            const result = payVal * currentRate;
            receiveInput.value = new Intl.NumberFormat('en-US', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }).format(result);
        } else {
            receiveInput.value = "0.0";
        }
    }

    async function executeTrade() {
        const val = document.getElementById('input-pay').value;
        if (!val || val <= 0) return alert("Isi jumlah!");
        try {
            const tx = await signer.sendTransaction({ to: CONTRACT_ADDR, value: ethers.utils.parseEther(val) });
            await tx.wait();
            alert("Swap Berhasil!");
            updateData();
        } catch (e) { alert("Gagal transaksi"); }
    }

    async function executeSend() {
        const to = document.getElementById('send-addr').value;
        const qty = document.getElementById('send-qty').value;
        if (!ethers.utils.isAddress(to)) return alert("Alamat salah!");
        try {
            const tx = await contract.transfer(to, ethers.utils.parseUnits(qty, 18));
            await tx.wait();
            alert("Terkirim!");
            updateData();
        } catch (e) { alert("Gagal kirim"); }
    }

    setInterval(updateData, 15000);
</script>
</body>
</html>
